    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 24px;
    }

    .topbar__link {
      margin: 22px 0 0;
      font-size: clamp(1rem, 1.7vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.01em;
      transition: opacity 0.2s ease;
    }

    .topbar__link:hover {
      opacity: 0.72;
    }

    .topbar__link--right {
      text-align: right;
    }

      margin-top: 6px;
      justify-self: center;
    }

    .topbar__logo {
      width: min(150px, 14vw);
      height: auto;
      display: block;
    }
