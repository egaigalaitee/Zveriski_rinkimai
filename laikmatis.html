<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laikmatis žaidimui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #E6DECB;
      --ink: #000000;
      --stroke: rgba(230, 222, 203, 0.92);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Poppins", sans-serif;
      background: var(--page-bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .page-frame {
      min-height: 100vh;
      padding: 28px 34px 24px;
      background: var(--page-bg);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 24px;
    }

    .topbar__link {
      margin: 28px 0 0;
      font-size: clamp(1rem, 1.8vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: opacity 0.2s ease;
    }

    .topbar__link:hover {
      opacity: 0.72;
    }

    .topbar__link--right {
      text-align: right;
    }

    .topbar__logo-link {
      justify-self: center;
      display: inline-block;
      margin-top: 8px;
    }

    .topbar__logo {
      width: min(170px, 16vw);
      height: auto;
      display: block;
    }

    .timer-layout {
      position: relative;
      min-height: calc(100vh - 120px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .clock-section {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .clock-shell {
      position: relative;
      width: min(980px, 78vw);
      aspect-ratio: 1 / 1;
    }

    .clock-shell__image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      user-select: none;
    }

    .timer-display {
      position: absolute;
      left: 50%;
      top: 56%;
      transform: translate(-50%, -50%);
      color: var(--page-bg);
      font-size: clamp(7rem, 16vw, 12rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
      user-select: none;
    }

    .preset {
      position: absolute;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 2px solid var(--stroke);
      background: transparent;
      color: var(--page-bg);
      font-size: 2.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .preset:hover,
    .preset:focus-visible,
    .preset.is-active {
      background: #E6DECB;
      color: #000000;
      outline: none;
    }

    .preset:hover,
    .preset:focus-visible {
      transform: translateY(-1px);
    }

    .preset--left {
      top: 34%;
      left: 16%;
    }

    .preset--top {
      top: 13.5%;
      left: 50%;
      transform: translateX(-50%);
    }

    .preset--top:hover,
    .preset--top:focus-visible,
    .preset--top.is-active {
      transform: translateX(-50%);
    }

    .preset--right {
      top: 34%;
      right: 16%;
    }

    .controls {
      position: absolute;
      right: 54px;
      bottom: 34px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 215px;
    }
