<!DOCTYPE html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laikmatis žaidimui | Žvėriški rinkimai</title>
    <meta
      name="description"
      content="Žaidimo laikmatis edukaciniam stalo žaidimui Žvėriški rinkimai."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body class="timer-page">
    <header class="hero hero--subpage hero--subpage-light">
      <button
        class="mobile-menu-button mobile-menu-button--dark"
        type="button"
        aria-expanded="false"
        aria-controls="mobile-menu"
        aria-label="Atidaryti meniu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div id="mobile-menu" class="mobile-menu mobile-menu--light" hidden>
        <div class="mobile-menu__panel">
          <button class="mobile-menu__close" type="button" aria-label="Uždaryti meniu">
            ×
          </button>
          <a class="mobile-menu__link" href="./mokytojo-gidas.html">Mokytojo gidas</a>
          <a class="mobile-menu__link" href="./index.html">Kas yra žvėriški rinkimai?</a>
          <a class="mobile-menu__link" href="./laikmatis.html">Laikmatis žaidimui</a>
        </div>
      </div>

      <nav class="topbar topbar--subpage topbar--subpage-light">
        <a class="topbar__link topbar__link--dark" href="./mokytojo-gidas.html">Mokytojo gidas</a>
        <a class="topbar__link topbar__link--dark topbar__link--center" href="./index.html">
          Kas yra žvėriški žaidimai?
        </a>
        <a class="topbar__link topbar__link--dark" href="./laikmatis.html">Laikmatis žaidimui</a>
      </nav>
    </header>

    <main class="timer-main">
      <section class="timer-stage-shell">
        <section class="timer-stage">
          <div class="timer-clock-wrap">
            <div class="timer-halo timer-halo--one"></div>
            <div class="timer-halo timer-halo--two"></div>

            <div class="timer-clock">
              <img class="timer-clock__image" src="./laikrodis.png" alt="" />

              <button class="timer-badge timer-badge--left" type="button" data-minutes="2">
                2
              </button>
              <button class="timer-badge timer-badge--top" type="button" data-minutes="5">
                5
              </button>
              <button class="timer-badge timer-badge--right" type="button" data-minutes="10">
                10
              </button>

              <div id="timer-display" class="timer-clock__display">3:00</div>
              <img class="timer-clock__brand" src="./logo.png" alt="" />
            </div>
          </div>

          <aside class="timer-side-panel">
            <div class="timer-side-controls">
              <button id="start-button" class="timer-action timer-action--primary" type="button">
                Pradėti
              </button>
              <button id="stop-button" class="timer-action" type="button">Sustabdyti</button>
              <button id="resume-button" class="timer-action" type="button">Pratęsti</button>
            </div>
          </aside>
        </section>
      </section>
    </main>

    <audio id="timer-sound" preload="auto">
      <source src="./Laikrodzio.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const timerDisplay = document.getElementById("timer-display");
      const startButton = document.getElementById("start-button");
      const stopButton = document.getElementById("stop-button");
      const resumeButton = document.getElementById("resume-button");
      const presetButtons = document.querySelectorAll("[data-minutes]");
      const timerSound = document.getElementById("timer-sound");
      const mobileMenu = document.getElementById("mobile-menu");
      const mobileMenuButton = document.querySelector(".mobile-menu-button");
      const mobileMenuClose = document.querySelector(".mobile-menu__close");
      const mobileMenuLinks = document.querySelectorAll(".mobile-menu__link");

      let selectedSeconds = 2 * 60;
      let remainingSeconds = selectedSeconds;
      let intervalId = null;

      function formatTime(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = String(totalSeconds % 60).padStart(2, "0");
        return `${minutes}:${seconds}`;
      }

      function renderTimer() {
        timerDisplay.textContent = formatTime(remainingSeconds);
      }

      function setActionState(state) {
        startButton.disabled = state === "running";
        resumeButton.disabled = state === "running" || remainingSeconds <= 0;
        stopButton.disabled = state !== "running";
      }

      function clearTimer() {
        clearInterval(intervalId);
        intervalId = null;
      }

      function playTimerSound() {
        timerSound.currentTime = 0;
        timerSound.play().catch(() => {
        });
      }

      function tick() {
        if (remainingSeconds <= 0) {
          clearTimer();
          playTimerSound();
          setActionState("finished");
          return;
        }

        remainingSeconds -= 1;
        renderTimer();

        if (remainingSeconds <= 0) {
          clearTimer();
          playTimerSound();
          setActionState("finished");
        }
      }

      function startTimer() {
        clearTimer();
        remainingSeconds = selectedSeconds;
        renderTimer();
        setActionState("running");
        intervalId = setInterval(tick, 1000);
      }

      function stopTimer() {
        if (!intervalId) {
          return;
        }

        clearTimer();
        setActionState("paused");
      }

      function resumeTimer() {
        if (intervalId || remainingSeconds <= 0) {
          return;
        }

        setActionState("running");
        intervalId = setInterval(tick, 1000);
      }

      presetButtons.forEach((button) => {
        button.addEventListener("click", () => {
          presetButtons.forEach((item) => item.classList.remove("timer-badge--active"));
          button.classList.add("timer-badge--active");

          selectedSeconds = Number(button.dataset.minutes) * 60;
          remainingSeconds = selectedSeconds;
          clearTimer();
          renderTimer();
          setActionState("idle");
        });
      });

      startButton.addEventListener("click", startTimer);
      stopButton.addEventListener("click", stopTimer);
      resumeButton.addEventListener("click", resumeTimer);

      presetButtons.forEach((button) => {
        if (button.dataset.minutes === "2") {
          button.classList.add("timer-badge--active");
        }
      });

      function setMobileMenu(open) {
        mobileMenu.hidden = !open;
        mobileMenu.classList.toggle("is-open", open);
        mobileMenu.style.display = open ? "block" : "none";
        mobileMenu.setAttribute("aria-hidden", String(!open));
        document.body.classList.toggle("menu-open", open);
        mobileMenuButton.setAttribute("aria-expanded", String(open));
      }

      mobileMenuButton.addEventListener("click", () => setMobileMenu(true));
      mobileMenuClose.addEventListener("click", () => setMobileMenu(false));
      mobileMenu.addEventListener("click", (event) => {
        if (event.target === mobileMenu) {
          setMobileMenu(false);
        }
      });

      mobileMenuLinks.forEach((link) => {
        link.addEventListener("click", () => setMobileMenu(false));
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setMobileMenu(false);
        }
      });

      renderTimer();
      setActionState("idle");
      setMobileMenu(false);
    </script>
  </body>
</html>
