<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laikmatis žaidimui</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #e6decb;
      --ink: #000000;
      --paper: #f8f2e7;
      --stroke: rgba(230, 222, 203, 0.92);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Poppins", sans-serif;
      background: var(--page-bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: inherit;
    }

    .page-frame {
      min-height: 100vh;
      padding: 28px;
      background: var(--page-bg);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 24px;
    }

    .topbar__link {
      margin: 28px 0 0;
      font-size: clamp(1rem, 1.8vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      transition: opacity 0.2s ease;
    }

    .topbar__link:hover {
      opacity: 0.72;
    }

    .topbar__link--right {
      text-align: right;
    }

    .topbar__logo-link {
      display: inline-block;
      margin-top: 8px;
      justify-self: center;
    }

    .topbar__logo {
      width: min(170px, 18vw);
      height: auto;
      display: block;
    }

    .timer-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 210px;
      gap: 34px;
      align-items: end;
      min-height: calc(100vh - 180px);
      padding: 8px 12px 12px;
    }

    .clock-section {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .clock-shell {
      position: relative;
      width: min(760px, 100%);
      aspect-ratio: 1 / 1;
    }

    .clock-shell__image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      user-select: none;
    }

    .timer-display {
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -31%);
      color: var(--page-bg);
      font-size: clamp(5rem, 14vw, 10rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      user-select: none;
    }

    .preset {
      position: absolute;
      width: clamp(76px, 10vw, 96px);
      height: clamp(76px, 10vw, 96px);
      border-radius: 50%;
      border: 2px solid var(--stroke);
      background: transparent;
      color: var(--paper);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .preset:hover,
    .preset:focus-visible,
    .preset.is-active {
      background: #ffffff;
      color: var(--ink);
      outline: none;
    }

    .preset:hover,
    .preset:focus-visible {
      transform: translateY(-1px);
    }

    .preset--left {
      top: 35%;
      left: 17%;
    }

    .preset--top {
      top: 16%;
      left: 50%;
      transform: translateX(-50%);
    }

    .preset--top:hover,
    .preset--top:focus-visible,
    .preset--top.is-active {
      transform: translateX(-50%);
    }

    .preset--right {
      top: 35%;
      right: 17%;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-self: end;
      padding-bottom: 18px;
    }

    .action-button {
      min-height: 58px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--ink);
      color: var(--page-bg);
      font-size: clamp(1.25rem, 2vw, 1.7rem);
      font-weight: 400;
      cursor: pointer;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .action-button:hover,
    .action-button:focus-visible {
      background: transparent;
      color: var(--ink);
      outline: none;
    }

    @media (max-width: 980px) {
      .page-frame {
        padding: 20px;
      }

      .topbar {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
      }

      .topbar__link,
      .topbar__link--right {
        margin-top: 0;
        text-align: center;
      }

      .timer-layout {
        grid-template-columns: 1fr;
        min-height: auto;
        gap: 24px;
        padding-top: 18px;
      }

      .controls {
        width: min(360px, 100%);
        margin: 0 auto;
        padding-bottom: 0;
      }
    }

    @media (max-width: 640px) {
      .page-frame {
        padding: 14px;
      }

      .clock-shell {
        width: min(100%, 520px);
      }

      .preset--left {
        left: 12%;
      }

      .preset--right {
        right: 12%;
      }
    }
  </style>
</head>
<body>
  <div class="page-frame">
    <header class="topbar">
      <a class="topbar__link" href="mokytojo-gidas.html">MOKYTOJO GIDAS</a>
      <a class="topbar__logo-link" href="index.html" aria-label="Grįžti į pagrindinį puslapį">
        <img class="topbar__logo" src="logo-juodas.png" alt="Žvėriški rinkimai logotipas">
      </a>
      <a class="topbar__link topbar__link--right" href="laikmatis.html">LAIKMATIS ŽAIDIMUI</a>
    </header>

    <main class="timer-layout">
      <section class="clock-section" aria-label="Laikmatis">
        <div class="clock-shell">
          <img class="clock-shell__image" src="laikrodis.png" alt="Laikrodžio iliustracija">

          <button class="preset preset--left" data-minutes="2" aria-label="Nustatyti 2 minutes">2</button>
          <button class="preset preset--top is-active" data-minutes="5" aria-label="Nustatyti 5 minutes">5</button>
          <button class="preset preset--right" data-minutes="10" aria-label="Nustatyti 10 minučių">10</button>

          <div class="timer-display" id="timerDisplay">5:00</div>
        </div>
      </section>

      <section class="controls" aria-label="Laikmačio valdymas">
        <button class="action-button" id="startBtn">Pradėti</button>
        <button class="action-button" id="pauseBtn">Sustabdyti</button>
        <button class="action-button" id="resumeBtn">Pratęsti</button>
      </section>
    </main>
  </div>

  <audio id="alarmSound" preload="auto">
    <source src="alarm.mp3" type="audio/mpeg">
  </audio>

  <script>
    const presets = document.querySelectorAll('.preset');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resumeBtn = document.getElementById('resumeBtn');
    const alarmSound = document.getElementById('alarmSound');

    let selectedMinutes = 5;
    let remainingSeconds = selectedMinutes * 60;
    let timerId = null;
    let isRunning = false;
    let hasFinished = false;

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function updateDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
    }

    function stopAlarm() {
      alarmSound.pause();
      alarmSound.currentTime = 0;
    }

    function setActivePreset(minutes) {
      selectedMinutes = minutes;
      presets.forEach((preset) => {
        const isActive = Number(preset.dataset.minutes) === minutes;
        preset.classList.toggle('is-active', isActive);
      });
    }

    function resetToSelectedTime() {
      remainingSeconds = selectedMinutes * 60;
      updateDisplay();
      hasFinished = false;
      stopAlarm();
    }

    function finishTimer() {
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      hasFinished = true;
      remainingSeconds = 0;
      updateDisplay();
      alarmSound.play().catch(() => {});
    }

    function tick() {
      if (remainingSeconds > 0) {
        remainingSeconds -= 1;
        updateDisplay();
      }

      if (remainingSeconds <= 0) {
        finishTimer();
      }
    }

    function startTimer() {
      clearInterval(timerId);
      stopAlarm();
      hasFinished = false;
      remainingSeconds = selectedMinutes * 60;
      updateDisplay();

      timerId = setInterval(tick, 1000);
      isRunning = true;
    }

    function pauseTimer() {
      if (!isRunning) return;
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
    }

    function resumeTimer() {
      if (isRunning || remainingSeconds <= 0 || hasFinished) return;
      timerId = setInterval(tick, 1000);
      isRunning = true;
    }

    presets.forEach((preset) => {
      preset.addEventListener('click', () => {
        const minutes = Number(preset.dataset.minutes);
        setActivePreset(minutes);
        clearInterval(timerId);
        timerId = null;
        isRunning = false;
        resetToSelectedTime();
      });
    });

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resumeBtn.addEventListener('click', resumeTimer);

    updateDisplay();
  </script>
</body>
</html>
